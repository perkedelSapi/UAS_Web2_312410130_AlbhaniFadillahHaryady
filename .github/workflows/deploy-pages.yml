name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['frontend-spa/**']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-spa
      - uses: actions/deploy-pages@v4
        id: deployment
